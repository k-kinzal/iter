[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# Advisories — flag known-vulnerable crates.
# ---------------------------------------------------------------------------
[advisories]
unmaintained = "all"
unsound = "all"
ignore = [
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile v1.0.4/v2.2.0 via hyper-rustls/aws-*; track rustls ecosystem update" },
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki v0.101.7/v0.103.12 via aws-smithy-http-client; track aws-smithy update" },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki v0.101.7/v0.103.12 via aws-smithy-http-client; track aws-smithy update" },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki v0.101.7/v0.103.12 via aws-smithy-http-client; track aws-smithy update" },
    { id = "RUSTSEC-2026-0002", reason = "lru v0.12.5 IterMut soundness; transitive dep; upgrade to >=0.16.3" },
    { id = "RUSTSEC-2026-0097", reason = "rand thread_rng unsoundness; only triggers with custom logger + reseed; transitive dep" },
]

# ---------------------------------------------------------------------------
# Licenses — only allow permissive/copyleft-free licenses.
# ---------------------------------------------------------------------------
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT-0",
    "0BSD",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.9
exceptions = [
    # UEFI firmware interface; no linking on our targets
    { allow = ["LGPL-2.1-or-later"], crate = "r-efi" },
]

[licenses.private]
ignore = true

# ---------------------------------------------------------------------------
# Bans — duplicate-version detection and crate deny-list.
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
    { crate = "openssl-sys", wrappers = ["native-tls", "openssl"] },
]

# All duplicates below are transitive; driven by upstream dependency version
# mismatches in the AWS SDK / legacy hyper-0.14 http stack.
skip-tree = [
    { crate = "hyper@0.14.32", reason = "legacy hyper 0.14 pulled transitively by the AWS SDK http stack; awaiting migration to hyper 1.x" },
    { crate = "http@0.2.12", reason = "legacy http 0.2 pulled by hyper 0.14; awaiting migration to http 1.x" },
    { crate = "rustls@0.21.12", reason = "legacy rustls 0.21 pulled transitively by the AWS SDK http stack; awaiting upstream update" },
]
skip = []

# ---------------------------------------------------------------------------
# Sources — only crates.io is allowed.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
