version = "2"

[scanner]
gitignore = true
exclude = [".git/**", "**/target/**"]

[content]
extensions = ["rs"]
max_lines = 1000
warn_threshold = 0.9
skip_comments = true
skip_blank = true

[[content.rules]]
pattern = "**/*_tests.rs"
max_lines = 1200
reason = "Unit test companion files"

[[content.rules]]
pattern = "**/tests/**"
max_lines = 1500
reason = "Integration tests"

# Limits are per-directory, not workspace-wide.
[structure]
max_files = 30
max_dirs = 15
max_depth = 8
warn_threshold = 0.8

[[structure.rules]]
scope = "**/tests/corpus/invalid"
max_files = 80
reason = "Parser test corpus — one file per grammar edge case"

[[structure.rules]]
scope = "**/tests/corpus/valid"
max_files = 70
reason = "Parser test corpus — one file per grammar production"

[[structure.rules]]
scope = "**/tests/corpus/compose/invalid"
max_files = 30
reason = "Compose parser test corpus"

[[structure.rules]]
scope = "**/tests/corpus/compose/valid"
max_files = 30
reason = "Compose parser test corpus"

# Trend data is stored in .git/sloc-guard/cache.json and requires
# `sloc-guard snapshot` to populate. Not available in shallow clones.
[trend]
max_entries = 100
max_age_days = 90
min_interval_secs = 3600
